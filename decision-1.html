<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>
        Tradición Olvidada
    </title>

    <!-- FUENTE -->

    <link rel="preconnect"
    href="https://fonts.googleapis.com">

    <link rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap"
    rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet"
    href="decision1.css">

</head>

<body>

    <!-- TRANSICION -->

    <div class="fade-screen"></div>

    <!-- BOTON VOLVER -->

    <a href="index.html"
    class="back-btn">

        ← Volver

    </a>

    <!-- AUDIO AMBIENTE -->

    <audio id="bg-audio"
    autoplay
    loop
    muted>

        <source src="ambiente.mp3"
        type="audio/mpeg">

    </audio>

    <!-- SONIDO BOTONES -->

    <audio id="ui-sound">

        <source src="click.mp3"
        type="audio/mpeg">

    </audio>

    <!-- ESCENA -->

    <main class="scene">

        <!-- OSCURECIMIENTO -->

        <div class="overlay"></div>

        <!-- CONTENIDO -->

        <div class="content">

            <h1>
                ¿A dónde quieres ir?
            </h1>

        </div>

        <!-- DECISIONES -->

        <div class="choices">

            <a href="Calle antigua.html"
            class="choice-btn left-btn">

                Calle antigua

            </a>

            <a href="Plaza.html"
            class="choice-btn right-btn">

                Plaza central

            </a>

        </div>

    </main>

    <!-- AUDIO AMBIENTE -->

    <script>

        const audio =
        document.getElementById("bg-audio");

        function enableAudio(){

            audio.muted = false;

            audio.volume = 0.05;

            audio.play();

            document.removeEventListener(
                "mousemove",
                enableAudio
            );

        }

        document.addEventListener(
            "mousemove",
            enableAudio
        );

    </script>

    <!-- SONIDO + TRANSICION -->

    <script>

        const uiSound =
        document.getElementById("ui-sound");

        const fade =
        document.querySelector(".fade-screen");

        const buttons =
        document.querySelectorAll(
            ".choice-btn,.back-btn"
        );

        buttons.forEach(button=>{

            button.addEventListener("click",(e)=>{

                e.preventDefault();

                const target =
                button.getAttribute("href");

                uiSound.currentTime = 0;

                uiSound.volume = 0.5;

                uiSound.play();

                fade.classList.add("active");

                setTimeout(()=>{

                    window.location.href =
                    target;

                },1200);

            });

        });

    </script>

</body>

</html>
