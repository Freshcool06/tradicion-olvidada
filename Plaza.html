<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradición Olvidada - Plaza Central</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jim+Nightshade&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="plaza.css">
</head>
<body>

    <div class="fade-screen"></div>

    <a href="decision-1.html" class="back-btn">← Volver al Cruce</a>

    <audio id="bg-audio" autoplay loop muted src="ambiente.mp3"></audio>
    <audio id="ui-sound" src="click.mp3"></audio>

    <main class="scene plaza-scene">
        <div class="background-past-plaza"></div>
        <div class="overlay"></div>

        <div class="content">
            <h1 id="narrative-title">La Plaza del Eco</h1>
            <p id="narrative-text" class="narrative">
                Las losas frías guardan silencio bajo el monumento. Posa tu mirada en la penumbra para despertar los aromas del pasado...
            </p>
        </div>

        <div class="interactive-container">
            
            <a href="#" class="hotspot hotspot-pareja" 
               data-title="Murmullos en la Penumbra" 
               data-text="Una pareja comparte confidencias ajena al paso de las décadas."
               data-note="(Lápida) «Bajo las sombras de la plaza, los jóvenes se encontraban en secreto para susurrar promesas que el viento esparcía entre las piedras. Era el latido de las noches del viejo pueblo; sin embargo hoy, solo queda el ECO de murmullos y risas del pasado.»">
                <div class="glow-object"></div>
            </a>

            <a href="#" class="hotspot hotspot-estatua" 
               data-title="La Revolución en Silencio" 
               data-text="Las figuras de metal imponen su silueta contra las nubes oscuras del cielo."
               data-note="(Rosa)«La gran estructura de metal se eleva como un testigo mudo de las luchas y las glorias de la provincia. Sus formas dinámicas inspiraron a los más grandes compositores y desafiaban al frío SERENO de la historia, capturando la fuerza de un pueblo que hoy parece caminar sin rumbo.»">
                <div class="glow-object"></div>
            </a>

            <a href="#" class="hotspot hotspot-carrito-cercano" 
               data-title="El Último Dulce" 
               data-text="La vitrina iluminada destella con la promesa de sabores tradicionales hechos a mano."
               data-note="(Carta)«Un pequeño rincón iluminado que endulzaba el paso de los transeúntes con recetas ancestrales de coco, papaya y manjar blanco. Estas manos artesanas no solo vendían golosinas, sino que entregaban pedazos de IDENTIDAD colonial que la modernidad de puro cemento pretende borrar.»">
                <div class="glow-object"></div>
            </a>

            <a href="final.html" class="portal-salida-plaza" id="btn-salir-plaza">
                <div class="glow-object"></div>
            </a>

        </div>

        <div id="note-modal" class="note-modal">
            <div id="note-paper" class="note-paper">
                <p id="note-content-text"></p>
                <button id="close-note-btn" class="close-note-btn">Cerrar recuerdo</button>
            </div>
        </div>
    </main>

    <script>
        const titleElement = document.getElementById("narrative-title");
        const textElement = document.getElementById("narrative-text");
        const hotspots = document.querySelectorAll(".hotspot");
        const uiSound = document.getElementById("ui-sound");
        const bgAudio = document.getElementById("bg-audio");

        const modal = document.getElementById("note-modal");
        const noteText = document.getElementById("note-content-text");
        const closeBtn = document.getElementById("close-note-btn");

        const defaultTitle = "La Plaza del Eco";
        const defaultText = "Las losas frías guardan silencio bajo el monumento. Posa tu mirada en la penumbra para despertar los aromas del pasado...";

        function activarAudioGlobal() {
            bgAudio.muted = false;
            bgAudio.volume = 0.15;

            bgAudio.play()
                .then(() => {
                    console.log("Música de la plaza iniciada correctamente.");
                    remueveDisparadores();
                })
                .catch(error => {
                    console.log("El navegador sigue esperando una interacción más directa (clic).");
                });
        }

        document.addEventListener("mousemove", activarAudioGlobal);
        document.addEventListener("touchstart", activarAudioGlobal);
        document.addEventListener("click", saferPlayAudio);

        function saferPlayAudio() {
            activarAudioGlobal();
        }

        function remueveDisparadores() {
            document.removeEventListener("mousemove", activarAudioGlobal);
            document.removeEventListener("touchstart", activarAudioGlobal);
        }

        const portalSalida = document.getElementById("btn-salir-plaza");
        if(portalSalida) {
            portalSalida.addEventListener("mouseenter", () => {
                titleElement.textContent = "El Sendero de las Sombras";
                textElement.textContent = "La luz de la plaza se extingue aquí. Cruza los límites del presente para encarar tu destino definitivo...";
            });
            portalSalida.addEventListener("mouseleave", () => {
                titleElement.textContent = defaultTitle;
                textElement.textContent = defaultText;
            });
            portalSalida.addEventListener("click", () => {
                uiSound.currentTime = 0;
                uiSound.play();
            });
        }

        hotspots.forEach(hotspot => {
            hotspot.addEventListener("mouseenter", () => {
                activarAudioGlobal();
                titleElement.textContent = hotspot.getAttribute("data-title");
                textElement.textContent = hotspot.getAttribute("data-text");
            });

            hotspot.addEventListener("mouseleave", () => {
                titleElement.textContent = defaultTitle;
                textElement.textContent = defaultText;
            });

            hotspot.addEventListener("click", (e) => {
                e.preventDefault();
                activarAudioGlobal();

                uiSound.currentTime = 0;
                uiSound.volume = 0.4;
                uiSound.play();

                noteText.innerHTML = hotspot.getAttribute("data-note");
                modal.classList.add("show");
            });
        });

        closeBtn.addEventListener("click", () => {
            uiSound.currentTime = 0;
            uiSound.play();
            modal.classList.remove("show");
        });
    </script>
</body>
</html>
